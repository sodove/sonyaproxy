services:
  sonyaproxy:
    build: .
    container_name: sonyaproxy
    restart: unless-stopped
    network_mode: host
    env_file: .env
    volumes:
      - ${GONIC_MUSIC_DIR:-/music}:${GONIC_MUSIC_DIR:-/music}
      - ./flavor.yml:/app/flavor.yml:ro
      - sonyaproxy-data:/app/data
    environment:
      - YTDLP_PATH=yt-dlp
      - DB_PATH=/app/data/sonyaproxy.db

volumes:
  sonyaproxy-data:
